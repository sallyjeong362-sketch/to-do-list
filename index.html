<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 투두 트래커</title>
<style>
  :root {
    --bg: #f6f4ef;
    --card: #ffffff;
    --ink: #3b3a36;
    --muted: #8b8880;
    --line: #e7e3da;
    --accent: #6b8e6f;
    --c1: #5b8dbf; /* 수업 */
    --c2: #6ba368; /* 운영 */
    --c3: #d99a4e; /* 수업자료 */
    --c4: #9b7cb8; /* 자기계발 */
    --c5: #4fa3a5; /* 일정표 */
    --sel-bg: #eef3ee;
    --carry-ink: #b5651d;
    --carry-bg: #faeede;
    --slot-bg: #e8f2f2;
    --hover-bg: #f4f7f4;
    --row-line: #f0ede6;
    --chip-ink: #ffffff;
    --sun: #c0564f;
    --slot-c1: #e7eef6;
    --slot-c2: #e9f1e8;
    --slot-c3: #f8efe2;
    --slot-c4: #f0eaf5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #22211d;
      --card: #2c2b26;
      --ink: #e8e5dc;
      --muted: #9a968b;
      --line: #3e3c34;
      --accent: #8fae92;
      --sel-bg: #333a33;
      --carry-ink: #e0a370;
      --carry-bg: #3d3227;
      --slot-bg: #2e3a3a;
      --hover-bg: #31352f;
      --row-line: #34322b;
      --chip-ink: #22211d;
      --sun: #d98079;
      --slot-c1: #29323d;
      --slot-c2: #2c352b;
      --slot-c3: #3c342a;
      --slot-c4: #342e3b;
    }
  }
  :root[data-theme="light"] {
    --bg: #f6f4ef; --card: #ffffff; --ink: #3b3a36; --muted: #8b8880;
    --line: #e7e3da; --accent: #6b8e6f; --sel-bg: #eef3ee;
    --carry-ink: #b5651d; --carry-bg: #faeede; --slot-bg: #e8f2f2;
    --hover-bg: #f4f7f4; --row-line: #f0ede6; --chip-ink: #ffffff; --sun: #c0564f;
    --slot-c1: #e7eef6; --slot-c2: #e9f1e8; --slot-c3: #f8efe2; --slot-c4: #f0eaf5;
  }
  :root[data-theme="dark"] {
    --bg: #22211d; --card: #2c2b26; --ink: #e8e5dc; --muted: #9a968b;
    --line: #3e3c34; --accent: #8fae92; --sel-bg: #333a33;
    --carry-ink: #e0a370; --carry-bg: #3d3227; --slot-bg: #2e3a3a;
    --hover-bg: #31352f; --row-line: #34322b; --chip-ink: #22211d; --sun: #d98079;
    --slot-c1: #29323d; --slot-c2: #2c352b; --slot-c3: #3c342a; --slot-c4: #342e3b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--ink);
    max-width: 720px; margin: 0 auto; padding: 12px 12px 80px;
  }
  h1 { font-size: 20px; }
  button { font-family: inherit; cursor: pointer; }
  input, select { color: var(--ink); color-scheme: light dark; }

  /* ── 헤더/보상 ─────────────────────────── */
  header.top {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 4px;
  }
  .reward-chip {
    display: flex; gap: 8px; align-items: center;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 20px; padding: 6px 12px; font-size: 13px;
  }
  .reward-chip b { color: var(--accent); }
  .levelbar {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 10px 14px; margin-bottom: 12px;
  }
  .levelbar .row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .levelbar .track { height: 8px; background: var(--line); border-radius: 4px; overflow: hidden; }
  .levelbar .fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .3s; }

  /* ── 캘린더 ───────────────────────────── */
  .calendar {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px; margin-bottom: 14px;
  }
  .cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .cal-head b { font-size: 15px; }
  .cal-head button {
    border: 1px solid var(--line); background: none; border-radius: 8px;
    width: 30px; height: 30px; font-size: 14px; color: var(--ink);
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dow { text-align: center; font-size: 11px; color: var(--muted); padding: 2px 0; }
  .cal-cell {
    border: 1px solid transparent; border-radius: 8px; background: none;
    min-height: 46px; padding: 3px 0 1px; font-size: 12px; color: var(--ink);
    display: flex; flex-direction: column; align-items: center; gap: 1px;
  }
  .cal-cell:not(:disabled):hover { border-color: var(--line); }
  .cal-cell .d { line-height: 1.2; }
  .cal-cell .badge { font-size: 13px; line-height: 1; }
  .cal-cell .pct { font-size: 9px; color: var(--muted); }
  .cal-cell.today .d {
    background: var(--ink); color: var(--card); border-radius: 50%;
    width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center;
  }
  .cal-cell.selected { border-color: var(--accent); background: var(--sel-bg); }
  .cal-cell.sun .d { color: var(--sun); } .cal-cell.today.sun .d { color: var(--card); }

  /* ── 날짜 표시줄 ──────────────────────── */
  .datebar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding: 0 2px;
  }
  .datebar .label { font-size: 15px; font-weight: 700; }
  .datebar .sub { font-size: 12px; color: var(--muted); }
  .datebar button {
    border: 1px solid var(--line); background: var(--card);
    border-radius: 8px; padding: 5px 10px; font-size: 12px; color: var(--ink);
  }

  /* ── 탭 ──────────────────────────────── */
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; overflow-x: auto; }
  .tabs button {
    flex: 1; white-space: nowrap; padding: 9px 8px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--line); border-radius: 10px; background: var(--card); color: var(--muted);
  }
  .tabs button.active { color: #fff; border-color: transparent; }
  .tabs button[data-tab="c1"].active { background: var(--c1); }
  .tabs button[data-tab="c2"].active { background: var(--c2); }
  .tabs button[data-tab="c3"].active { background: var(--c3); }
  .tabs button[data-tab="c4"].active { background: var(--c4); }
  .tabs button[data-tab="sch"].active { background: var(--c5); }

  /* ── 투두 목록 ────────────────────────── */
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px; }
  .add-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .add-row input[type=text] {
    flex: 1; padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px;
    font-size: 14px; font-family: inherit; background: var(--bg);
  }
  .add-row button.add {
    padding: 9px 16px; border: none; border-radius: 10px; background: var(--ink);
    color: var(--card); font-size: 14px;
  }
  ul.todos { list-style: none; }
  ul.todos li {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 4px; border-bottom: 1px solid var(--line);
  }
  ul.todos li:last-child { border-bottom: none; }
  .chk {
    width: 22px; height: 22px; flex: none; border-radius: 7px;
    border: 2px solid var(--line); background: none; font-size: 13px; color: var(--chip-ink);
  }
  .chk.on { border-color: var(--accent); background: var(--accent); }
  .t-title { flex: 1; font-size: 14px; word-break: break-all; }
  .t-title.done { text-decoration: line-through; color: var(--muted); }
  .tag-carry {
    font-size: 10px; color: var(--carry-ink); background: var(--carry-bg);
    border-radius: 6px; padding: 2px 6px; flex: none;
  }
  .icon-btn {
    border: none; background: none; color: var(--muted); font-size: 14px;
    padding: 4px; flex: none;
  }
  .icon-btn:hover { color: var(--ink); }
  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 18px 0; }
  .cat-progress { font-size: 12px; color: var(--muted); margin-bottom: 8px; }

  /* ── 일정표 ───────────────────────────── */
  .sch-form {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 12px;
  }
  .sch-form input, .sch-form select {
    padding: 8px 10px; border: 1px solid var(--line); border-radius: 10px;
    font-size: 13px; font-family: inherit; background: var(--bg);
  }
  .sch-form input { flex: 1 1 100%; }
  .sch-form select { flex: 1 1 auto; }
  .sch-form button { flex: 0 0 auto; }
  .sch-form button {
    padding: 8px 14px; border: none; border-radius: 10px;
    background: var(--c5); color: #fff; font-size: 13px;
  }
  .sch-progress { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .timeline { border-top: 1px solid var(--line); }
  .slot-row { display: flex; align-items: stretch; min-height: 26px; border-bottom: 1px solid var(--row-line); }
  .slot-row.hour-start { border-top: 1px solid var(--line); }
  .slot-time {
    width: 48px; flex: none; font-size: 10px; color: var(--muted);
    padding: 6px 4px 0 2px; text-align: right;
  }
  .slot-body { flex: 1; padding: 2px 0 2px 8px; display: flex; align-items: center; }
  .slot-body.clickable { cursor: pointer; }
  .slot-body.clickable:hover { background: var(--hover-bg); }
  .slot-block {
    flex: 1; display: flex; align-items: center; gap: 8px;
    border-radius: 8px; padding: 3px 8px; font-size: 13px;
    background: var(--slot-bg); border-left: 4px solid var(--c5);
  }
  .slot-block.done-block { opacity: .55; }
  .slot-block.cat-c1 { background: var(--slot-c1); border-left-color: var(--c1); }
  .slot-block.cat-c2 { background: var(--slot-c2); border-left-color: var(--c2); }
  .slot-block.cat-c3 { background: var(--slot-c3); border-left-color: var(--c3); }
  .slot-block.cat-c4 { background: var(--slot-c4); border-left-color: var(--c4); }
  .balance { margin-bottom: 10px; }
  .balance-bar { display: flex; height: 10px; border-radius: 5px; overflow: hidden; background: var(--line); }
  .balance-bar span { height: 100%; }
  .balance-legend { display: flex; flex-wrap: wrap; gap: 4px 10px; margin-top: 6px; font-size: 11px; color: var(--muted); }
  .balance-legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 3px; }
  .slot-block .name.done { text-decoration: line-through; }
  .slot-block .name { flex: 0 1 auto; max-width: 48%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .slot-block .note-input {
    flex: 1; min-width: 40px; border: none; background: transparent;
    font-size: 11px; color: var(--muted); font-family: inherit;
    border-bottom: 1px dashed transparent; padding: 2px 0 2px 4px;
  }
  .slot-block .note-input:focus { outline: none; border-bottom-color: var(--c5); color: var(--ink); }
  .slot-block .chk { width: 19px; height: 19px; font-size: 11px; border-radius: 6px; touch-action: none; }
  .fill-handle {
    flex: none; width: 20px; height: 20px; border-radius: 6px;
    border: 1px dashed var(--muted); color: var(--muted); font-size: 11px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: ns-resize; touch-action: none; background: var(--card); user-select: none;
  }
  .slot-body.fill-preview { background: var(--hover-bg); box-shadow: inset 4px 0 0 var(--c5); border-radius: 8px; }
  .slot-input {
    flex: 1; padding: 4px 8px; font-size: 13px; font-family: inherit;
    border: 1px solid var(--c5); border-radius: 8px; background: var(--bg); color: var(--ink);
  }

  /* ── 오늘 요약 ────────────────────────── */
  .day-summary {
    margin-top: 12px; background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px 14px; font-size: 13px;
    display: flex; align-items: center; gap: 10px;
  }
  .day-summary .big { font-size: 26px; }
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: var(--ink); color: var(--card); font-size: 13px;
    padding: 10px 18px; border-radius: 20px; opacity: 0; transition: opacity .3s;
    pointer-events: none; z-index: 10; max-width: 90%;
  }
  .toast.show { opacity: .95; }

  /* ── 동기화 ───────────────────────────── */
  .sync-chip {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--card);
    font-size: 15px; color: var(--muted); position: relative;
  }
  .sync-chip.ok { color: var(--accent); border-color: var(--accent); }
  .sync-chip.syncing { color: var(--c1); }
  .sync-chip.error { color: var(--sun); border-color: var(--sun); }
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: none; align-items: center; justify-content: center; z-index: 20; padding: 16px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    max-width: 420px; width: 100%; padding: 18px; font-size: 14px;
    max-height: 85vh; overflow-y: auto;
  }
  .modal h2 { font-size: 16px; margin-bottom: 10px; }
  .modal p.desc { color: var(--muted); font-size: 12px; line-height: 1.6; margin-bottom: 12px; }
  .modal .btn {
    display: block; width: 100%; padding: 10px; margin-top: 8px;
    border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
    background: var(--accent); color: #fff;
  }
  .modal .btn.secondary { background: none; border: 1px solid var(--line); color: var(--ink); font-weight: 400; }
  .modal .btn.danger { background: none; border: 1px solid var(--sun); color: var(--sun); font-weight: 400; }
  .modal input.code-input {
    width: 100%; padding: 10px; margin-top: 8px;
    border: 1px solid var(--line); border-radius: 10px; background: var(--bg);
    font-size: 13px; font-family: inherit;
  }
  .modal .code-box {
    background: var(--bg); border: 1px dashed var(--line); border-radius: 10px;
    padding: 10px; font-size: 12px; word-break: break-all; margin: 8px 0;
    font-family: ui-monospace, monospace;
  }
  .modal .sync-meta { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .modal .close-row { text-align: right; margin-top: 12px; }
  .modal .close-row button { border: none; background: none; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<header class="top">
  <h1>🗓 나의 투두 트래커</h1>
  <div style="display:flex;gap:6px;align-items:center">
    <button class="sync-chip" id="syncBtn" title="기기 간 동기화">☁</button>
    <div class="reward-chip">
      <span id="levelEmoji">🌱</span>
      <span><b id="points">0</b>P</span>
      <span>🔥 <b id="streak">0</b>일</span>
    </div>
  </div>
</header>

<div class="levelbar">
  <div class="row"><span id="levelName">새싹</span><span id="levelNext"></span></div>
  <div class="track"><div class="fill" id="levelFill" style="width:0%"></div></div>
</div>

<div class="calendar">
  <div class="cal-head">
    <button id="calPrev">◀</button>
    <b id="calTitle"></b>
    <button id="calNext">▶</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="datebar">
  <div>
    <div class="label" id="dateLabel"></div>
    <div class="sub" id="dateSub"></div>
  </div>
  <button id="goToday">오늘로</button>
</div>

<div class="tabs" id="tabs">
  <button data-tab="c1">1. 수업</button>
  <button data-tab="c2">2. 운영</button>
  <button data-tab="c3">3. 수업자료</button>
  <button data-tab="c4">4. 자기계발</button>
  <button data-tab="sch">5. 일정표</button>
</div>

<div class="panel" id="panel"></div>

<div class="day-summary">
  <span class="big" id="sumEmoji">🌱</span>
  <div>
    <div><b id="sumRate">0%</b> 달성</div>
    <div style="color:var(--muted)" id="sumMsg"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="syncModal">
  <div class="modal" id="syncModalBody"></div>
</div>

<script>
(function () {
  'use strict';

  var CATS = {
    c1: { name: '수업',     color: 'var(--c1)' },
    c2: { name: '운영',     color: 'var(--c2)' },
    c3: { name: '수업자료', color: 'var(--c3)' },
    c4: { name: '자기계발', color: 'var(--c4)' }
  };
  var CAT_KEYS = ['c1', 'c2', 'c3', 'c4'];
  var SLOT_START = 5 * 60;   // 05:00
  var SLOT_END = 24 * 60;    // 24:00
  var STEP = 15;
  var POINT_TODO = 10;       // 할 일 1개 완료
  var POINT_SLOT = 5;        // 15분 블록 1개 완료
  var LEVELS = [
    { at: 0,    name: '새싹',   emoji: '🌱' },
    { at: 100,  name: '잎새',   emoji: '🌿' },
    { at: 300,  name: '가지',   emoji: '🪴' },
    { at: 600,  name: '나무',   emoji: '🌳' },
    { at: 1000, name: '큰나무', emoji: '🌲' },
    { at: 1500, name: '숲',     emoji: '🏞' },
    { at: 2500, name: '전설의 숲', emoji: '🌈' }
  ];

  var STORE_KEY = 'todoTracker.v1';
  var state = load();
  var todayKey = dateKey(new Date());
  var selectedDate = todayKey;
  var calCursor = new Date();       // 캘린더에 표시 중인 달
  var activeTab = 'c1';
  var uid = function () { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); };

  /* ── 저장/불러오기 ─────────────────────── */
  function load() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        var s = JSON.parse(raw);
        if (s && s.days) return s;
      }
    } catch (e) {}
    return { days: {}, meta: { points: 0 } };
  }
  function saveLocal() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  function save() {
    if (!state.meta) state.meta = { points: 0 };
    state.meta.updatedAt = Date.now();
    if (typeof lastActivityAt !== 'undefined') lastActivityAt = Date.now();
    saveLocal();
    schedulePush();
  }
  function day(key) {
    if (!state.days[key]) state.days[key] = { todos: [], slots: {} };
    if (!state.days[key].slots) state.days[key].slots = {};
    if (!state.days[key].todos) state.days[key].todos = [];
    return state.days[key];
  }

  /* ── 날짜 유틸 ────────────────────────── */
  function pad(n) { return (n < 10 ? '0' : '') + n; }
  function dateKey(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
  function parseKey(k) { var p = k.split('-'); return new Date(+p[0], +p[1] - 1, +p[2]); }
  function fmtLabel(k) {
    var d = parseKey(k);
    var dow = ['일', '월', '화', '수', '목', '금', '토'][d.getDay()];
    return (d.getMonth() + 1) + '월 ' + d.getDate() + '일 (' + dow + ')';
  }
  function minToHM(m) { return pad(Math.floor(m / 60)) + ':' + pad(m % 60); }

  /* ── 통계 ─────────────────────────────── */
  function dayStats(key) {
    var d = state.days[key];
    var total = 0, done = 0;
    if (d) {
      (d.todos || []).forEach(function (t) { if (t.del) return; total++; if (t.done) done++; });
      Object.keys(d.slots || {}).forEach(function (m) { if (d.slots[m].del) return; total++; if (d.slots[m].done) done++; });
    }
    return { total: total, done: done, rate: total ? done / total : 0 };
  }
  function badgeFor(st) {
    if (!st.total) return '';
    if (st.rate >= 1)   return '🏆';
    if (st.rate >= 0.8) return '🌟';
    if (st.rate >= 0.5) return '🌤';
    if (st.rate > 0)    return '🌱';
    return '▫️';
  }
  function calcStreak() {
    var n = 0;
    var d = new Date();
    // 오늘은 아직 진행 중이므로, 오늘이 80% 이상이면 포함
    var todaySt = dayStats(dateKey(d));
    if (todaySt.total && todaySt.rate >= 0.8) n++;
    d.setDate(d.getDate() - 1);
    for (;;) {
      var st = dayStats(dateKey(d));
      if (st.total && st.rate >= 0.8) { n++; d.setDate(d.getDate() - 1); }
      else break;
    }
    return n;
  }
  function levelInfo(points) {
    var cur = LEVELS[0], next = null;
    for (var i = 0; i < LEVELS.length; i++) {
      if (points >= LEVELS[i].at) cur = LEVELS[i];
      else { next = LEVELS[i]; break; }
    }
    return { cur: cur, next: next };
  }
  function addPoints(n, msg) {
    state.meta.points = Math.max(0, (state.meta.points || 0) + n);
    if (n > 0 && msg) toast(msg + ' +' + n + 'P');
  }

  /* ── 이월 (전날 못 지킨 것 → 오늘 자동 추가) ── */
  function carryOver() {
    var moved = 0;
    Object.keys(state.days).forEach(function (key) {
      if (key >= todayKey) return;
      (state.days[key].todos || []).forEach(function (t) {
        if (!t.done && !t.carriedForward && !t.del) {
          t.carriedForward = true;
          t.ts = Date.now();
          day(todayKey).todos.push({
            id: uid(), cat: t.cat, title: t.title,
            done: false, carried: true, from: key, ts: Date.now()
          });
          moved++;
        }
      });
    });
    if (moved) {
      save();
      toast('어제까지 못 끝낸 할 일 ' + moved + '개를 오늘로 가져왔어요 📦');
    }
  }

  /* ── 토스트 ───────────────────────────── */
  var toastTimer = null;
  function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.classList.remove('show'); }, 2200);
  }

  /* ── 렌더: 보상 헤더 ──────────────────── */
  function renderReward() {
    var pts = state.meta.points || 0;
    var li = levelInfo(pts);
    document.getElementById('points').textContent = pts;
    document.getElementById('streak').textContent = calcStreak();
    document.getElementById('levelEmoji').textContent = li.cur.emoji;
    document.getElementById('levelName').textContent = li.cur.emoji + ' ' + li.cur.name;
    var fill = document.getElementById('levelFill');
    var nextEl = document.getElementById('levelNext');
    if (li.next) {
      var span = li.next.at - li.cur.at;
      fill.style.width = Math.min(100, Math.round((pts - li.cur.at) / span * 100)) + '%';
      nextEl.textContent = '다음 ' + li.next.emoji + ' ' + li.next.name + '까지 ' + (li.next.at - pts) + 'P';
    } else {
      fill.style.width = '100%';
      nextEl.textContent = '최고 레벨 달성! 🎉';
    }
  }

  /* ── 렌더: 캘린더 ─────────────────────── */
  function renderCalendar() {
    var y = calCursor.getFullYear(), m = calCursor.getMonth();
    document.getElementById('calTitle').textContent = y + '년 ' + (m + 1) + '월';
    var grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    ['일', '월', '화', '수', '목', '금', '토'].forEach(function (d) {
      var el = document.createElement('div');
      el.className = 'cal-dow'; el.textContent = d;
      grid.appendChild(el);
    });
    var first = new Date(y, m, 1).getDay();
    var count = new Date(y, m + 1, 0).getDate();
    for (var i = 0; i < first; i++) grid.appendChild(document.createElement('div'));
    for (var dd = 1; dd <= count; dd++) {
      var key = y + '-' + pad(m + 1) + '-' + pad(dd);
      var st = dayStats(key);
      var cell = document.createElement('button');
      cell.className = 'cal-cell';
      if (key === todayKey) cell.className += ' today';
      if (key === selectedDate) cell.className += ' selected';
      if (new Date(y, m, dd).getDay() === 0) cell.className += ' sun';
      var html = '<span class="d">' + dd + '</span>';
      var b = badgeFor(st);
      if (b) html += '<span class="badge">' + b + '</span><span class="pct">' + Math.round(st.rate * 100) + '%</span>';
      cell.innerHTML = html;
      cell.dataset.key = key;
      cell.addEventListener('click', function () {
        selectedDate = this.dataset.key;
        renderAll();
      });
      grid.appendChild(cell);
    }
  }

  /* ── 렌더: 날짜줄 & 요약 ──────────────── */
  function renderDatebar() {
    document.getElementById('dateLabel').textContent = fmtLabel(selectedDate);
    document.getElementById('dateSub').textContent =
      selectedDate === todayKey ? '오늘' : (selectedDate < todayKey ? '지난 날짜' : '예정');
    var st = dayStats(selectedDate);
    document.getElementById('sumRate').textContent = Math.round(st.rate * 100) + '%';
    document.getElementById('sumEmoji').textContent = st.total ? (badgeFor(st) || '🌱') : '📝';
    var msg;
    if (!st.total) msg = '할 일을 추가해서 하루를 계획해 보세요.';
    else if (st.rate >= 1) msg = '완벽해요! 오늘의 트로피 획득 🏆';
    else if (st.rate >= 0.8) msg = '아주 잘하고 있어요, 조금만 더!';
    else if (st.rate >= 0.5) msg = '절반을 넘겼어요. 꾸준히 가봅시다.';
    else msg = st.done + '개 완료 / 총 ' + st.total + '개';
    document.getElementById('sumMsg').textContent = msg;
  }

  /* ── 할 일 ↔ 일정표 블록 연동 ─────────── */
  function syncSlotsWithTodo(t) {
    var slots = day(selectedDate).slots;
    var changed = 0;
    Object.keys(slots).forEach(function (k) {
      var sl = slots[k];
      if (!sl.del && sl.name === t.title && sl.done !== t.done) {
        sl.done = t.done;
        sl.ts = Date.now();
        addPoints(t.done ? POINT_SLOT : -POINT_SLOT);
        changed++;
      }
    });
    return changed;
  }

  /* ── 렌더: 카테고리 탭 (1~4) ──────────── */
  function renderCatPanel(cat) {
    var panel = document.getElementById('panel');
    var d = day(selectedDate);
    var todos = d.todos.filter(function (t) { return t.cat === cat && !t.del; });
    var doneN = todos.filter(function (t) { return t.done; }).length;

    panel.innerHTML =
      '<div class="add-row">' +
      '  <input type="text" id="newTodo" placeholder="' + CATS[cat].name + ' 할 일 추가…" maxlength="80">' +
      '  <button class="add" id="addTodo">추가</button>' +
      '</div>' +
      (todos.length ? '<div class="cat-progress">' + doneN + ' / ' + todos.length + ' 완료</div>' : '') +
      '<ul class="todos" id="todoList"></ul>';

    var list = document.getElementById('todoList');
    if (!todos.length) {
      list.innerHTML = '<div class="empty">아직 할 일이 없어요.</div>';
    } else {
      todos.forEach(function (t) {
        var li = document.createElement('li');
        var carryTag = t.carried
          ? '<span class="tag-carry">↪ ' + (t.from ? t.from.slice(5).replace('-', '/') : '이월') + '</span>' : '';
        li.innerHTML =
          '<button class="chk' + (t.done ? ' on' : '') + '">' + (t.done ? '✓' : '') + '</button>' +
          '<span class="t-title' + (t.done ? ' done' : '') + '"></span>' + carryTag +
          '<button class="icon-btn edit" title="수정">✎</button>' +
          '<button class="icon-btn del" title="삭제">✕</button>';
        li.querySelector('.t-title').textContent = t.title;
        li.querySelector('.chk').addEventListener('click', function () {
          t.done = !t.done;
          t.ts = Date.now();
          addPoints(t.done ? POINT_TODO : -POINT_TODO, null);
          var n = syncSlotsWithTodo(t);
          if (t.done) {
            toast(n ? '할 일 완료! 일정표 블록 ' + n + '개도 함께 완료 +' + (POINT_TODO + n * POINT_SLOT) + 'P'
                    : '할 일 완료! +' + POINT_TODO + 'P');
          }
          save(); renderAll();
        });
        li.querySelector('.edit').addEventListener('click', function () {
          var v = prompt('할 일 수정', t.title);
          if (v !== null && v.trim()) { t.title = v.trim(); t.ts = Date.now(); save(); renderAll(); }
        });
        li.querySelector('.del').addEventListener('click', function () {
          if (!confirm('「' + t.title + '」 삭제할까요?')) return;
          if (t.done) addPoints(-POINT_TODO);
          t.del = Date.now();
          t.ts = Date.now();
          save(); renderAll();
        });
        list.appendChild(li);
      });
    }

    function addNew() {
      var inp = document.getElementById('newTodo');
      var v = inp.value.trim();
      if (!v) return;
      d.todos.push({ id: uid(), cat: cat, title: v, done: false, carried: false, ts: Date.now() });
      save(); renderAll();
      var again = document.getElementById('newTodo');
      if (again) again.focus();
    }
    document.getElementById('addTodo').addEventListener('click', addNew);
    document.getElementById('newTodo').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addNew();
    });
  }

  /* ── 일정표 드래그 다중 체크 ──────────── */
  var slotDrag = null;
  var slotDragEndAt = 0;
  function applyDragTo(min) {
    if (!slotDrag) return;
    var slots = day(selectedDate).slots;
    var sl = slots[min];
    if (!sl || sl.del || sl.done === slotDrag.target) return;
    sl.done = slotDrag.target;
    sl.ts = Date.now();
    slotDrag.changed.push(min);
    var row = document.querySelector('.slot-row[data-min="' + min + '"]');
    if (row) {
      var block = row.querySelector('.slot-block');
      var chk = row.querySelector('.chk');
      var nameEl = row.querySelector('.name');
      if (block) block.classList.toggle('done-block', sl.done);
      if (chk) { chk.classList.toggle('on', sl.done); chk.textContent = sl.done ? '✓' : ''; }
      if (nameEl) nameEl.classList.toggle('done', sl.done);
    }
  }
  function onSlotDragMove(e) {
    var el = document.elementFromPoint(e.clientX, e.clientY);
    var row = el && el.closest ? el.closest('.slot-row[data-min]') : null;
    if (row) applyDragTo(+row.getAttribute('data-min'));
  }
  function endSlotDrag() {
    document.removeEventListener('pointermove', onSlotDragMove);
    document.removeEventListener('pointerup', endSlotDrag);
    document.removeEventListener('pointercancel', endSlotDrag);
    if (!slotDrag) return;
    var n = slotDrag.changed.length;
    var target = slotDrag.target;
    slotDrag = null;
    slotDragEndAt = Date.now();
    if (n) {
      addPoints(target ? n * POINT_SLOT : -n * POINT_SLOT, null);
      toast(target ? '15분 블록 ' + n + '개 완료! +' + (n * POINT_SLOT) + 'P'
                   : '15분 블록 ' + n + '개 체크 해제');
      save();
    }
    renderAll();
  }
  function startSlotDrag(min) {
    var sl = day(selectedDate).slots[min];
    if (!sl || sl.del || slotDrag) return;
    slotDrag = { target: !sl.done, changed: [] };
    applyDragTo(min);
    document.addEventListener('pointermove', onSlotDragMove);
    document.addEventListener('pointerup', endSlotDrag);
    document.addEventListener('pointercancel', endSlotDrag);
  }

  /* ── 일정표 채우기 드래그 (엑셀식 복제) ── */
  var fillDrag = null;
  function updateFillPreview(targetMin) {
    if (!fillDrag) return;
    var slots = day(selectedDate).slots;
    var src = fillDrag.sourceMin;
    var mins = [];
    if (targetMin !== src) {
      var dir = targetMin > src ? STEP : -STEP;
      for (var m = src + dir; (dir > 0 ? m <= targetMin : m >= targetMin); m += dir) {
        if (m < SLOT_START || m >= SLOT_END || (slots[m] && !slots[m].del)) break;
        mins.push(m);
      }
    }
    fillDrag.mins = mins;
    var prev = document.querySelectorAll('.slot-body.fill-preview');
    for (var i = 0; i < prev.length; i++) prev[i].classList.remove('fill-preview');
    mins.forEach(function (mm) {
      var body = document.querySelector('.slot-row[data-min="' + mm + '"] .slot-body');
      if (body) body.classList.add('fill-preview');
    });
  }
  function onFillMove(e) {
    var el = document.elementFromPoint(e.clientX, e.clientY);
    var row = el && el.closest ? el.closest('.slot-row[data-min]') : null;
    if (row) updateFillPreview(+row.getAttribute('data-min'));
  }
  function endFillDrag() {
    document.removeEventListener('pointermove', onFillMove);
    document.removeEventListener('pointerup', endFillDrag);
    document.removeEventListener('pointercancel', endFillDrag);
    if (!fillDrag) return;
    var mins = fillDrag.mins || [];
    var slots = day(selectedDate).slots;
    var src = slots[fillDrag.sourceMin];
    fillDrag = null;
    if (mins.length && src && !src.del) {
      mins.forEach(function (m) {
        slots[m] = { name: src.name, done: false, group: src.group, cat: src.cat || null, ts: Date.now() };
      });
      save();
      toast('「' + src.name + '」 ' + mins.length + '칸 채움 (+' + fmtDur(mins.length * STEP) + ')');
    }
    renderAll();
  }
  function startFillDrag(min) {
    if (fillDrag || slotDrag) return;
    var s0 = day(selectedDate).slots[min];
    if (!s0 || s0.del) return;
    fillDrag = { sourceMin: min, mins: [] };
    document.addEventListener('pointermove', onFillMove);
    document.addEventListener('pointerup', endFillDrag);
    document.addEventListener('pointercancel', endFillDrag);
  }

  /* ── 렌더: 일정표 (15분 단위) ─────────── */
  function matchTodoCat(name) {
    var todos = day(selectedDate).todos;
    for (var i = 0; i < todos.length; i++) {
      if (!todos[i].del && todos[i].title === name) return todos[i].cat;
    }
    return null;
  }
  function fmtDur(min) {
    var h = Math.floor(min / 60), m = min % 60;
    return (h ? h + '시간' : '') + (h && m ? ' ' : '') + (m || !h ? m + '분' : '');
  }
  function balanceHTML(slots) {
    var counts = {};
    var total = 0;
    Object.keys(slots).forEach(function (k) {
      if (slots[k].del) return;
      var c = slots[k].cat && CATS[slots[k].cat] ? slots[k].cat : 'etc';
      counts[c] = (counts[c] || 0) + 1;
      total++;
    });
    if (!total) return '';
    var order = CAT_KEYS.concat(['etc']);
    var colorOf = function (c) { return c === 'etc' ? 'var(--c5)' : 'var(--' + c + ')'; };
    var nameOf = function (c) { return c === 'etc' ? '기타' : CATS[c].name; };
    var bar = '', legend = '';
    order.forEach(function (c) {
      if (!counts[c]) return;
      var pct = counts[c] / total * 100;
      bar += '<span style="width:' + pct.toFixed(1) + '%;background:' + colorOf(c) + '"></span>';
      legend += '<span><i class="dot" style="background:' + colorOf(c) + '"></i>' +
        nameOf(c) + ' ' + fmtDur(counts[c] * STEP) + ' (' + Math.round(pct) + '%)</span>';
    });
    return '<div class="balance"><div class="balance-bar">' + bar + '</div>' +
      '<div class="balance-legend">' + legend + '</div></div>';
  }
  function renderSchedule() {
    var panel = document.getElementById('panel');
    var d = day(selectedDate);
    var slots = d.slots;
    var keys = Object.keys(slots).filter(function (k) { return !slots[k].del; });
    var doneN = keys.filter(function (k) { return slots[k].done; }).length;

    var timeOpts = '';
    for (var m = SLOT_START; m < SLOT_END; m += STEP) {
      timeOpts += '<option value="' + m + '">' + minToHM(m) + '</option>';
    }
    var durOpts = [15, 30, 45, 60, 90, 120].map(function (n) {
      return '<option value="' + n + '">' + n + '분</option>';
    }).join('');

    var dl = day(selectedDate).todos.filter(function (t) { return !t.done && !t.del; })
      .map(function (t) {
        return '<option value="' + t.title.replace(/"/g, '&quot;') + '" label="' +
          (CATS[t.cat] ? CATS[t.cat].name + ' · ' : '') + t.title.replace(/"/g, '&quot;') + '">';
      }).join('');

    var catOpts = '<option value="">카테고리 자동</option>' +
      CAT_KEYS.map(function (k) { return '<option value="' + k + '">' + CATS[k].name + '</option>'; }).join('') +
      '<option value="etc">기타</option>';

    panel.innerHTML =
      '<div class="sch-form">' +
      '  <input type="text" id="schName" list="schDl" placeholder="활동 (할 일에서 선택 가능)" maxlength="60">' +
      '  <datalist id="schDl">' + dl + '</datalist>' +
      '  <select id="schCat" title="카테고리">' + catOpts + '</select>' +
      '  <select id="schStart">' + timeOpts + '</select>' +
      '  <select id="schDur">' + durOpts + '</select>' +
      '  <button id="schAdd">배치</button>' +
      '</div>' +
      '<div class="sch-progress">15분 블록 ' + doneN + ' / ' + keys.length + ' 실천 · 빈 칸 클릭=바로 입력 · ✓ 누른 채 드래그=여러 칸 체크/해제 · ⇕ 드래그=같은 활동으로 아래 칸 채우기(엑셀식)</div>' +
      balanceHTML(slots) +
      '<div class="timeline" id="timeline"></div>';

    var tl = document.getElementById('timeline');
    for (var mm = SLOT_START; mm < SLOT_END; mm += STEP) {
      (function (mm) {
        var row = document.createElement('div');
        row.className = 'slot-row' + (mm % 60 === 0 ? ' hour-start' : '');
        row.setAttribute('data-min', mm);
        var timeCell = '<div class="slot-time">' + (mm % 60 === 0 ? minToHM(mm) : '') + '</div>';
        var s = slots[mm];
        if (s && !s.del) {
          row.innerHTML = timeCell +
            '<div class="slot-body"><div class="slot-block' + (s.done ? ' done-block' : '') +
            (s.cat && CATS[s.cat] ? ' cat-' + s.cat : '') + '">' +
            '<button class="chk' + (s.done ? ' on' : '') + '">' + (s.done ? '✓' : '') + '</button>' +
            '<span class="name' + (s.done ? ' done' : '') + '"></span>' +
            '<input class="note-input" maxlength="60" placeholder="세부 작업 메모">' +
            '<span class="fill-handle" title="드래그해서 같은 활동으로 칸 채우기">⇕</span>' +
            '<button class="icon-btn del" title="이 활동 삭제">✕</button>' +
            '</div></div>';
          row.querySelector('.name').textContent = s.name;
          var noteInp = row.querySelector('.note-input');
          noteInp.value = s.note || '';
          noteInp.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') this.blur();
            e.stopPropagation();
          });
          noteInp.addEventListener('blur', function () {
            var v = this.value.trim();
            if ((s.note || '') === v) return;
            if (v) s.note = v; else delete s.note;
            s.ts = Date.now();
            save();
          });
          row.querySelector('.fill-handle').addEventListener('pointerdown', function (e) {
            e.preventDefault();
            startFillDrag(mm);
          });
          var chk = row.querySelector('.chk');
          chk.addEventListener('pointerdown', function (e) {
            e.preventDefault();
            startSlotDrag(mm);
          });
          chk.addEventListener('click', function () {
            if (Date.now() - slotDragEndAt < 400) return;
            s.done = !s.done;
            s.ts = Date.now();
            addPoints(s.done ? POINT_SLOT : -POINT_SLOT, s.done ? '15분 실천!' : null);
            save(); renderAll();
          });
          row.querySelector('.del').addEventListener('click', function () {
            var g = s.group;
            var members = Object.keys(slots).filter(function (k) { return slots[k].group === g; });
            if (!confirm('「' + s.name + '」 (' + members.length * STEP + '분) 일정을 삭제할까요?')) return;
            members.forEach(function (k) {
              if (slots[k].done) addPoints(-POINT_SLOT);
              slots[k] = { del: Date.now(), ts: Date.now() };
            });
            save(); renderAll();
          });
        } else {
          row.innerHTML = timeCell + '<div class="slot-body clickable"></div>';
          row.querySelector('.slot-body').addEventListener('click', function () {
            if (this.querySelector('input')) return;
            this.classList.remove('clickable');
            this.innerHTML = '<input class="slot-input" maxlength="60" placeholder="' + minToHM(mm) + ' 세부 계획 입력 후 Enter">';
            var inp = this.querySelector('input');
            inp.focus();
            var committed = false;
            var commit = function () {
              if (committed) return;
              committed = true;
              var v = inp.value.trim();
              if (v) {
                slots[mm] = { name: v, done: false, group: uid(), cat: matchTodoCat(v), ts: Date.now() };
                save();
              }
              renderAll();
            };
            inp.addEventListener('keydown', function (e) {
              if (e.key === 'Enter') commit();
              if (e.key === 'Escape') { committed = true; renderAll(); }
            });
            inp.addEventListener('blur', commit);
          });
        }
        tl.appendChild(row);
      })(mm);
    }

    document.getElementById('schAdd').addEventListener('click', function () {
      var name = document.getElementById('schName').value.trim();
      if (!name) { toast('활동 이름을 입력해 주세요'); return; }
      var start = +document.getElementById('schStart').value;
      var dur = +document.getElementById('schDur').value;
      if (start + dur > SLOT_END) { toast('24:00을 넘길 수 없어요'); return; }
      for (var m2 = start; m2 < start + dur; m2 += STEP) {
        if (slots[m2] && !slots[m2].del) { toast(minToHM(m2) + ' 칸이 이미 차 있어요'); return; }
      }
      var selCat = document.getElementById('schCat').value;
      var cat = selCat && selCat !== 'etc' ? selCat : (selCat === 'etc' ? null : matchTodoCat(name));
      var g = uid();
      for (var m3 = start; m3 < start + dur; m3 += STEP) {
        slots[m3] = { name: name, done: false, group: g, cat: cat, ts: Date.now() };
      }
      save(); renderAll();
    });
  }

  /* ── 렌더: 탭/전체 ────────────────────── */
  function renderTabs() {
    var btns = document.querySelectorAll('#tabs button');
    btns.forEach(function (b) {
      b.classList.toggle('active', b.dataset.tab === activeTab);
    });
  }
  function renderPanel() {
    if (activeTab === 'sch') renderSchedule();
    else renderCatPanel(activeTab);
  }
  function renderAll() {
    // 선택된 날짜의 달이 캘린더에 보이도록
    var sd = parseKey(selectedDate);
    if (sd.getFullYear() !== calCursor.getFullYear() || sd.getMonth() !== calCursor.getMonth()) {
      calCursor = new Date(sd.getFullYear(), sd.getMonth(), 1);
    }
    renderReward();
    renderCalendar();
    renderDatebar();
    renderTabs();
    renderPanel();
  }

  /* ── 이벤트 ───────────────────────────── */
  document.getElementById('tabs').addEventListener('click', function (e) {
    var b = e.target.closest('button[data-tab]');
    if (!b) return;
    activeTab = b.dataset.tab;
    renderTabs(); renderPanel();
  });
  document.getElementById('calPrev').addEventListener('click', function () {
    calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth() - 1, 1);
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', function () {
    calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth() + 1, 1);
    renderCalendar();
  });
  document.getElementById('goToday').addEventListener('click', function () {
    selectedDate = todayKey;
    calCursor = new Date();
    renderAll();
  });

  // 자정을 넘겨 계속 켜 두어도 새 날짜로 이월되도록 주기 점검
  setInterval(function () {
    var nowKey = dateKey(new Date());
    if (nowKey !== todayKey) {
      todayKey = nowKey;
      if (selectedDate < todayKey) selectedDate = todayKey;
      carryOver();
      renderAll();
    }
  }, 60 * 1000);

  /* ── 기기 간 동기화 (로그인 불필요) ────── */
  var SYNC_API = 'https://jsonblob.com/api/jsonBlob';
  var SYNC_KEY = 'todoTracker.sync';
  var sync = (function () {
    try { var s = JSON.parse(localStorage.getItem(SYNC_KEY)); if (s && typeof s === 'object') return s; } catch (e) {}
    return { id: null, lastSyncAt: null };
  })();
  var pushTimer = null;
  var lastActivityAt = Date.now();
  var lastPullAt = 0;

  function saveSync() { localStorage.setItem(SYNC_KEY, JSON.stringify(sync)); }
  function setSyncUI(st) {
    var btn = document.getElementById('syncBtn');
    btn.className = 'sync-chip' + (sync.id ? ' ' + st : '');
    btn.textContent = !sync.id ? '☁' : (st === 'syncing' ? '⟳' : (st === 'error' ? '☁!' : '☁'));
    btn.title = !sync.id ? '기기 간 동기화 설정'
      : (st === 'error' ? '동기화 오류 — 눌러서 확인' : '동기화 ' + (st === 'syncing' ? '중…' : '연결됨'));
  }
  function markSynced() { sync.lastSyncAt = Date.now(); saveSync(); setSyncUI('ok'); }

  function schedulePush() {
    if (!sync.id) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(pushNow, 800);
  }
  function pushNow() {
    if (!sync.id) return Promise.resolve();
    setSyncUI('syncing');
    return fetch(SYNC_API + '/' + encodeURIComponent(sync.id), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    }).then(function (r) {
      if (!r.ok) throw new Error(r.status);
      markSynced();
    }).catch(function () { setSyncUI('error'); });
  }
  function mergeStates(local, remote) {
    var lU = (local.meta && local.meta.updatedAt) || 0;
    var rU = (remote.meta && remote.meta.updatedAt) || 0;
    var newer = rU >= lU ? remote : local;
    var older = rU >= lU ? local : remote;
    var out = { days: {}, meta: {} };
    var dates = {};
    Object.keys(local.days || {}).forEach(function (k) { dates[k] = 1; });
    Object.keys(remote.days || {}).forEach(function (k) { dates[k] = 1; });
    Object.keys(dates).sort().forEach(function (dk) {
      var a = (newer.days || {})[dk], b = (older.days || {})[dk];
      if (!a || !b) { out.days[dk] = JSON.parse(JSON.stringify(a || b)); return; }
      var merged = { todos: [], slots: {} };
      var byId = {}, order = [], seenCarry = {};
      var carryKey = function (t) { return t.cat + '|' + t.title + '|' + (t.from || ''); };
      (a.todos || []).forEach(function (t) {
        byId[t.id] = t; order.push(t.id);
        if (t.carried && !t.del) seenCarry[carryKey(t)] = 1;
      });
      (b.todos || []).forEach(function (t) {
        var prev = byId[t.id];
        if (prev) {
          // 같은 항목이 양쪽에 있으면 더 최근에 수정(삭제 포함)한 쪽을 채택
          if ((t.ts || 0) > (prev.ts || 0)) byId[t.id] = t;
          return;
        }
        if (t.carried && !t.del && seenCarry[carryKey(t)]) return;
        byId[t.id] = t; order.push(t.id);
        if (t.carried && !t.del) seenCarry[carryKey(t)] = 1;
      });
      var now = Date.now();
      var GC_MS = 14 * 24 * 60 * 60 * 1000;
      order.forEach(function (id) {
        var t = byId[id];
        if (t.del && now - t.del > GC_MS) return; // 오래된 삭제 표식 정리
        merged.todos.push(t);
      });
      var sa = a.slots || {}, sb = b.slots || {};
      var mins = {};
      Object.keys(sa).forEach(function (m) { mins[m] = 1; });
      Object.keys(sb).forEach(function (m) { mins[m] = 1; });
      Object.keys(mins).forEach(function (m) {
        var va = sa[m], vb = sb[m];
        var v = !va ? vb : (!vb ? va : (((vb.ts || 0) > (va.ts || 0)) ? vb : va));
        if (v.del && now - v.del > GC_MS) return;
        merged.slots[m] = v;
      });
      out.days[dk] = JSON.parse(JSON.stringify(merged));
    });
    out.meta.points = Math.max((local.meta && local.meta.points) || 0, (remote.meta && remote.meta.points) || 0);
    out.meta.updatedAt = Math.max(lU, rU);
    return out;
  }
  function adoptState(next) {
    state = next;
    if (!state.meta) state.meta = { points: 0 };
    if (!state.days) state.days = {};
    saveLocal();
    carryOver();
    renderAll();
  }
  function pullNow(quiet) {
    if (!sync.id) return Promise.resolve();
    lastPullAt = Date.now();
    if (!quiet) setSyncUI('syncing');
    return fetch(SYNC_API + '/' + encodeURIComponent(sync.id)).then(function (r) {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    }).then(function (remote) {
      if (remote && typeof remote === 'object' && remote.days) {
        var ae = document.activeElement;
        var typing = ae && ae.tagName === 'INPUT' && ae.type !== 'checkbox' &&
          typeof ae.value === 'string' && ae.value.trim().length > 0;
        if (!typing) {
          var merged = mergeStates(state, remote);
          if (JSON.stringify(merged) !== JSON.stringify(state)) {
            adoptState(merged);
            lastActivityAt = Date.now();
          }
          if (JSON.stringify(merged) !== JSON.stringify(remote)) schedulePush();
        }
      }
      markSynced();
    }).catch(function () { setSyncUI('error'); });
  }
  function createRoom() {
    setSyncUI('syncing');
    state.meta.updatedAt = Date.now();
    saveLocal();
    return fetch(SYNC_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    }).then(function (r) {
      if (!r.ok) throw new Error(r.status);
      var loc = r.headers.get('Location') || r.headers.get('location') || '';
      var id = loc.split('/').pop();
      if (!id) throw new Error('no id');
      sync.id = id;
      markSynced();
      renderSyncModal();
      toast('동기화 코드가 만들어졌어요 ☁');
    }).catch(function () {
      setSyncUI('error');
      alert('동기화 서버에 연결하지 못했어요. 잠시 후 다시 시도해 주세요.');
    });
  }
  function connectRoom(id) {
    id = (id || '').trim().split('/').pop();
    if (!id) return Promise.resolve();
    setSyncUI('syncing');
    return fetch(SYNC_API + '/' + encodeURIComponent(id)).then(function (r) {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    }).then(function (remote) {
      sync.id = id;
      if (remote && typeof remote === 'object' && remote.days) {
        adoptState(mergeStates(state, remote));
      }
      pushNow();
      renderSyncModal();
      toast('동기화가 연결됐어요 ☁ 두 기기의 데이터를 합쳤어요');
    }).catch(function () {
      setSyncUI('error');
      alert('해당 코드를 찾을 수 없어요. 코드를 다시 확인해 주세요.');
    });
  }
  function disconnectRoom() {
    if (!confirm('동기화 연결을 해제할까요?\n(이 기기의 데이터는 그대로 남고, 다른 기기와의 연동만 끊어져요)')) return;
    sync.id = null; sync.lastSyncAt = null;
    saveSync(); setSyncUI('off'); renderSyncModal();
  }
  function copyText(text, label) {
    var done = function () { toast(label + ' 복사 완료!'); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function () { prompt('직접 복사해 주세요:', text); });
    } else { prompt('직접 복사해 주세요:', text); }
  }
  function syncLink() {
    return location.origin + location.pathname + '?sync=' + encodeURIComponent(sync.id);
  }
  function fmtTime(ts) {
    if (!ts) return '-';
    var d = new Date(ts);
    return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  function renderSyncModal() {
    var body = document.getElementById('syncModalBody');
    if (!sync.id) {
      body.innerHTML =
        '<h2>☁ 기기 간 동기화</h2>' +
        '<p class="desc">로그인 없이 PC와 모바일에서 같은 데이터를 쓸 수 있어요.<br>' +
        '한 기기에서 <b>동기화 코드</b>를 만들고, 다른 기기에서 그 코드(또는 링크)로 연결하면 됩니다.<br>' +
        '⚠️ 코드를 아는 사람은 누구나 데이터를 보거나 수정할 수 있으니 비밀번호처럼 다뤄 주세요.</p>' +
        '<button class="btn" id="syncCreate">새 동기화 코드 만들기</button>' +
        '<input class="code-input" id="syncCodeInput" placeholder="다른 기기에서 만든 코드 붙여넣기">' +
        '<button class="btn secondary" id="syncConnect">코드로 연결하기</button>' +
        '<div class="close-row"><button id="syncClose">닫기</button></div>';
      document.getElementById('syncCreate').addEventListener('click', createRoom);
      document.getElementById('syncConnect').addEventListener('click', function () {
        connectRoom(document.getElementById('syncCodeInput').value);
      });
    } else {
      body.innerHTML =
        '<h2>☁ 동기화 연결됨</h2>' +
        '<p class="desc">아래 링크를 다른 기기(모바일 등)에서 열면 바로 연동됩니다.<br>' +
        '두 기기를 같이 켜두면 변경사항이 몇 초 안에 서로 반영돼요.<br>' +
        '메모장·메신저 "나에게 보내기"로 링크를 전달하면 편해요.</p>' +
        '<div class="code-box" id="syncLinkBox"></div>' +
        '<button class="btn" id="syncCopyLink">🔗 연동 링크 복사</button>' +
        '<button class="btn secondary" id="syncCopyCode">코드만 복사</button>' +
        '<button class="btn secondary" id="syncNow">지금 동기화</button>' +
        '<button class="btn danger" id="syncOff">연결 해제</button>' +
        '<div class="sync-meta">마지막 동기화: ' + fmtTime(sync.lastSyncAt) + '</div>' +
        '<div class="close-row"><button id="syncClose">닫기</button></div>';
      document.getElementById('syncLinkBox').textContent = syncLink();
      document.getElementById('syncCopyLink').addEventListener('click', function () { copyText(syncLink(), '연동 링크'); });
      document.getElementById('syncCopyCode').addEventListener('click', function () { copyText(sync.id, '코드'); });
      document.getElementById('syncNow').addEventListener('click', function () {
        pullNow().then(pushNow).then(renderSyncModal);
      });
      document.getElementById('syncOff').addEventListener('click', disconnectRoom);
    }
    document.getElementById('syncClose').addEventListener('click', closeSyncModal);
  }
  function openSyncModal() { renderSyncModal(); document.getElementById('syncModal').classList.add('show'); }
  function closeSyncModal() { document.getElementById('syncModal').classList.remove('show'); }

  document.getElementById('syncBtn').addEventListener('click', openSyncModal);
  document.getElementById('syncModal').addEventListener('click', function (e) {
    if (e.target === this) closeSyncModal();
  });
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') { lastActivityAt = Date.now(); pullNow(); }
  });
  // 준실시간 폴링: 최근 3분 내 활동(내 저장 또는 상대 기기의 변경 수신)이 있으면
  // 4초마다, 그 외에는 30초마다 확인. 화면이 꺼져 있으면 쉬고, 입력 중이면 적용을 미룸.
  setInterval(function () {
    if (!sync.id || document.visibilityState !== 'visible') return;
    var fast = Date.now() - lastActivityAt < 3 * 60 * 1000;
    if (Date.now() - lastPullAt >= (fast ? 4000 : 30000)) pullNow(true);
  }, 2000);

  /* ── 시작 ─────────────────────────────── */
  carryOver();
  renderAll();
  setSyncUI('ok');
  (function () {
    var m = location.search.match(/[?&]sync=([^&]+)/);
    var linkId = m ? decodeURIComponent(m[1]) : null;
    if (linkId && history.replaceState) {
      history.replaceState(null, '', location.pathname);
    }
    if (linkId && linkId !== sync.id) connectRoom(linkId);
    else if (sync.id) pullNow();
  })();
})();
</script>
</body>
</html>
